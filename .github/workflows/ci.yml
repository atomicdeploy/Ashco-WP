name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: composer install --no-interaction --prefer-dist
      - run: composer lint
      - run: composer test
      - run: composer test:js
      - name: Build production ZIP
        shell: pwsh
        run: ./scripts/build-plugin.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: ashko-wp-plugin
          path: dist/ashko-wp-*.zip
          if-no-files-found: error
